name: booking

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       booking
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      PGDATA:            /var/lib/postgresql/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d booking"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Migrations (init container) ───────────────────────────────────────────
  # Uses the builder stage (which has the full dev toolchain, including the
  # prisma CLI from devDependencies) to apply pending migrations and then exits.
  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: builder
    working_dir: /build/apps/backend
    command: ["./node_modules/.bin/prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/booking
    depends_on:
      db:
        condition: service_healthy

  # ── Backend (Fastify) ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/booking
      PORT: "3000"
      HOST: "0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ── Frontend (nginx + React SPA) ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
