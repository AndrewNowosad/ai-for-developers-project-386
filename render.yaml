databases:
  - name: booking-db
    plan: free
    databaseName: booking
    user: booking

services:
  # ── Backend (Fastify + Prisma) ─────────────────────────────────────────────
  - type: web
    name: booking-backend
    plan: free
    runtime: node
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @booking/backend db:generate &&
      store=$(find node_modules/.pnpm -maxdepth 1 -type d -name "@prisma+client@*" | head -1) &&
      rm -rf "$store/node_modules/.prisma" &&
      cp -r apps/backend/node_modules/.prisma "$store/node_modules/.prisma" &&
      pnpm --filter @booking/backend build &&
      pnpm --filter @booking/backend db:deploy
    startCommand: pnpm --filter @booking/backend start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: booking-db
          property: connectionString
      - key: HOST
        value: "0.0.0.0"
      - key: NODE_VERSION
        value: "24"
      - key: PNPM_VERSION
        value: "9"

  # ── Frontend (React SPA) ───────────────────────────────────────────────────
  - type: web
    name: booking-frontend
    runtime: static
    buildCommand: >-
      pnpm install --frozen-lockfile &&
      pnpm --filter @booking/frontend build
    staticPublishPath: ./apps/frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: booking-backend
          type: web
          property: url
      - key: NODE_VERSION
        value: "24"
      - key: PNPM_VERSION
        value: "9"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
